<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Restauracja Dworcowa</title>
  <desc id="desc">Znak restauracji Dworcowa inspirowany jasnym banerem z profilu restauracji.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3e0c5"/>
      <stop offset="0.52" stop-color="#e6c69c"/>
      <stop offset="1" stop-color="#f7ead6"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.85" numOctaves="3" seed="12" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA tableValues="0 0.13" type="table"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="18" fill="url(#paper)"/>
  <rect x="20" y="20" width="680" height="380" rx="14" fill="none" stroke="#c99a63" stroke-width="3" opacity="0.38"/>
  <g filter="url(#grain)">
    <path d="M118 108c90-50 394-50 484 0" fill="none" stroke="#b9864e" stroke-width="7" stroke-linecap="round"/>
    <path d="M118 360c90 50 394 50 484 0" fill="none" stroke="#b9864e" stroke-width="7" stroke-linecap="round"/>
    <text x="360" y="140" fill="#b9864e" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="8" text-anchor="middle">RESTAURACJA</text>
    <text x="360" y="224" fill="#b16f35" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" letter-spacing="8" text-anchor="middle">DWORCOWA</text>
    <text x="360" y="284" fill="#b9864e" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="700" letter-spacing="3" text-anchor="middle">USLUGI KATERINGOWE</text>
    <text x="360" y="334" fill="#b16f35" font-family="Georgia, 'Times New Roman', serif" font-size="36" letter-spacing="5" text-anchor="middle">GORLICE</text>
  </g>
</svg>
